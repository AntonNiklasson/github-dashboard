name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @github-dashboard/desktop build

      - name: Package + publish
        run: pnpm --filter @github-dashboard/desktop package --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is not yet configured. Until certs are added, builds
          # ship unsigned. macOS users will need to right-click → Open the first
          # time.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
