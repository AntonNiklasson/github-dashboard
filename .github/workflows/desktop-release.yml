name: Desktop Release

on:
  # Manual trigger from the Actions UI. Pick a mode:
  #   - rc: bump packages/desktop/package.json to the next -rc.N (starting
  #     a new rc cycle on the next patch if currently on a stable version),
  #     commit, tag, push, then build + publish a GitHub *pre-release*.
  #   - release: bump to the next patch (or drop the -rc.N suffix when
  #     promoting a release candidate), commit, tag, push, then build +
  #     publish a *draft* GitHub Release.
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        type: choice
        required: true
        default: "rc"
        options:
          - rc
          - release
  # Tag-push fallback — push a v*.*.* tag yourself and the build will run.
  # Useful if you want to skip the patch-bump default for a one-off
  # minor / major / custom version.
  push:
    tags:
      - "v*.*.*"

jobs:
  bump:
    name: Bump version + tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      ref: ${{ steps.bump.outputs.ref }}
    steps:
      # Use a PAT for checkout so the push from this job can bypass the
      # "main requires PR" ruleset. The GITHUB_TOKEN identity (github-actions[bot])
      # can't be added as a bypass actor on personal repos; the PAT belongs to
      # the repo admin, who is whitelisted via RepositoryRole bypass.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump + commit
        id: bump
        run: |
          set -x
          mode="${{ inputs.mode }}"
          current=$(node -p "require('./packages/desktop/package.json').version")
          # `npm version` from a workspace member silently skipped its git
          # commit/tag side effects in CI (see run 26024176128). Drive the
          # version bump with --no-git-tag-version and do the commit here
          # so it's explicit and visible in the log.
          cd packages/desktop
          if [ "$mode" = "rc" ]; then
            if [[ "$current" == *"-rc."* ]]; then
              # Already on rc.N — increment to rc.N+1.
              new_version=$(npm version prerelease --no-git-tag-version)
            else
              # Stable → start a new rc cycle on the next patch.
              new_version=$(npm version prepatch --preid=rc --no-git-tag-version)
            fi
          else
            # release mode. If we're on an rc, npm version patch strips the
            # -rc.N suffix and lands on the base patch (e.g. 0.0.2-rc.3 → 0.0.2).
            # Otherwise it bumps the patch (0.0.1 → 0.0.2).
            new_version=$(npm version patch --no-git-tag-version)
          fi
          # Normalize to `vX.Y.Z[-rc.N]` regardless of npm's output prefix.
          new_version="v${new_version#v}"
          cd ../..
          git add packages/desktop/package.json
          git commit -m "release: desktop $new_version"
          echo "ref=$new_version" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git log -1 --oneline

      - name: Push commit
        # RELEASE_TOKEN (a PAT) is needed to bypass the "main requires PR"
        # ruleset on this push.
        run: git push

      - name: Create tag via API
        # Create the tag with GITHUB_TOKEN — not the PAT — so the resulting
        # ref push does NOT fire this workflow's `push: tags` trigger. A PAT
        # push would spawn a duplicate run that races us on the same draft
        # release (see run 26151944923).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "/repos/${{ github.repository }}/git/refs" \
            -f "ref=refs/tags/${{ steps.bump.outputs.ref }}" \
            -f "sha=${{ steps.bump.outputs.sha }}"

  build:
    name: Build (macOS)
    needs: [bump]
    # Run when bump succeeded (workflow_dispatch) or was skipped (tag push).
    if: ${{ always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped') }}
    runs-on: macos-latest
    permissions:
      # electron-builder POSTs to /releases via GITHUB_TOKEN; default
      # job perms are read-only and 403 on that call.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # If we just bumped, build the tagged commit; otherwise build the
          # ref that triggered the workflow.
          ref: ${{ needs.bump.outputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @github-dashboard/desktop build

      # Always publish to a draft first. GitHub's immutable-releases behavior
      # locks published releases (including pre-releases) against further
      # changes, so creating one straight as pre-release breaks the
      # create-then-upload-assets sequence electron-builder uses. Drafts are
      # mutable; the promote step below flips it to pre-release after uploads.
      - name: Package + publish (draft)
        run: pnpm --filter @github-dashboard/desktop package --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is not yet configured. Until certs are added, builds
          # ship unsigned. macOS users will need to right-click → Open the first
          # time.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Promote draft to pre-release (rc mode)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rc'
        run: gh release edit "${{ needs.bump.outputs.ref }}" --draft=false --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build a friendlier release body: direct .dmg links up top + GitHub's
      # auto-generated commit list below. The raw asset list (zips, blockmaps,
      # latest-mac.yml) still renders below the body, but most users only see
      # the .dmg link now.
      - name: Write release notes
        run: |
          set -euo pipefail
          tag="${{ needs.bump.outputs.ref || github.ref_name }}"
          version="${tag#v}"
          repo="${{ github.repository }}"
          base_url="https://github.com/${repo}/releases/download/${tag}"
          changelog=$(gh api -X POST "/repos/${repo}/releases/generate-notes" \
            -f tag_name="$tag" --jq '.body' \
            | node .github/scripts/group-changelog.mjs)
          {
            echo "## Download"
            echo
            echo "- **Apple Silicon (M1/M2/M3/M4):** [GitHub-Dashboard-${version}-arm64.dmg](${base_url}/GitHub-Dashboard-${version}-arm64.dmg)"
            echo "- **Intel:** [GitHub-Dashboard-${version}.dmg](${base_url}/GitHub-Dashboard-${version}.dmg)"
            echo
            echo "Other files in the asset list are consumed by the in-app auto-updater."
            echo
            echo "---"
            echo
            echo "$changelog"
          } > /tmp/notes.md
          gh release edit "$tag" --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
