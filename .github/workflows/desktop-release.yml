name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger: builds installers across the matrix without uploading
  # anything. Use this to validate the release pipeline before pushing a tag.
  workflow_dispatch:

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @github-dashboard/desktop build

      - name: Package (dry run, no upload)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm --filter @github-dashboard/desktop package --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package + publish
        if: github.event_name == 'push'
        run: pnpm --filter @github-dashboard/desktop package --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is not yet configured. Until certs are added, builds
          # ship unsigned. macOS users will need to right-click → Open the first
          # time.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.exe
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.yml
          if-no-files-found: ignore
